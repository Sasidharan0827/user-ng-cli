<section class="page-shell page-shell--content page-shell--embedded">
  <header class="page-header" data-aos="fade-up">
    <div>
      <p class="eyebrow">Charity Directory</p>
      <h1 class="page-title">Partner impact discovery with search, filter, and event previews.</h1>
    </div>
    <div class="topbar-actions">
      <a class="dashboard-btn dashboard-btn--ghost" routerLink="/">Back Home</a>
      <a class="dashboard-btn dashboard-btn--primary" routerLink="/dashboard">Open Dashboard</a>
    </div>
  </header>

  <section class="dashboard-card dashboard-card--lg" data-aos="fade-up" data-aos-delay="80">
    <div class="directory-toolbar">
      <label class="directory-filter">
        <span class="sr-only">Search charities</span>
        <input type="text" [(ngModel)]="searchTerm" placeholder="Search by charity, city, or mission..." />
      </label>

      <div class="filter-group">
        <button
          type="button"
          *ngFor="let filter of filters"
          class="filter-chip"
          [class.filter-chip--active]="filter === activeFilter"
          (click)="activeFilter = filter"
        >
          {{ filter }}
        </button>
      </div>
    </div>

    <div class="charity-directory-grid">
      <article class="charity-card charity-card--directory" *ngFor="let charity of filteredCharities">
        <div class="charity-card__topline">
          <span class="pill-tag" [class.pill-tag--rose]="charity.featured">{{ charity.category }}</span>
          <span class="muted-copy" *ngIf="charity.featured">Featured on homepage</span>
        </div>
        <h3>{{ charity.name }}</h3>
        <p>{{ charity.summary }}</p>

        <div class="detail-pairs">
          <div>
            <span class="muted-label">Location</span>
            <strong>{{ charity.location }}</strong>
          </div>
          <div>
            <span class="muted-label">Measured Impact</span>
            <strong>{{ charity.impact }}</strong>
          </div>
        </div>

        <div>
          <div class="muted-label">Upcoming Events</div>
          <div class="event-pills">
            <span class="tier-pill" *ngFor="let event of charity.events">{{ event }}</span>
          </div>
        </div>
      </article>
    </div>
  </section>
</section>
